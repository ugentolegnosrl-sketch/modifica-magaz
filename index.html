<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Magazzino Mobile — Supabase</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #1d2230;
      --text: #f1f5f9;
      --muted: #9aa4b2;
      --accent: #58a6ff;
      --accent-2: #7ee787;
      --danger: #ff7b72;
      --warning: #f2cc60;
      --border: #2a3140;
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
      --radius: 18px;
      --font: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--text);
      font-family: var(--font); min-height: 100%;
    }
    body { padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom); }

    .app { width: 100%; max-width: 760px; margin: 0 auto; padding: 14px 14px 260px; }

    .topbar {
      position: sticky; top: 0; z-index: 30;
      background: linear-gradient(180deg, rgba(15,17,21,0.98), rgba(15,17,21,0.90));
      backdrop-filter: blur(10px);
      padding: 10px 0 12px; margin-bottom: 12px;
    }

    h1, h2, h3, h4, p { margin: 0; }
    h1 { font-size: 1.35rem; }
    h2 { font-size: 1.1rem; }
    h3 { font-size: 1rem; }

    .muted { color: var(--muted); }
    .tiny { font-size: 0.8rem; }
    .small { font-size: 0.92rem; }
    .hidden { display: none !important; }

    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .space-between { justify-content: space-between; }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }
    .panel + .panel { margin-top: 12px; }

    .btn, .icon-btn, .select, .input {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 14px;
      font: inherit;
    }

    .btn, .icon-btn {
      padding: 11px 14px; cursor: pointer;
      transition: 0.18s ease; min-height: 44px;
    }
    .btn:hover, .icon-btn:hover { transform: translateY(-1px); }
    .btn:active, .icon-btn:active { transform: translateY(0); }
    .btn:disabled, .icon-btn:disabled { opacity: 0.45; cursor: default; transform: none; }

    .btn.primary { background: var(--accent); color: #08121f; border-color: transparent; font-weight: 700; }
    .btn.success { background: var(--accent-2); color: #0b1a0e; border-color: transparent; font-weight: 700; }
    .btn.danger  { background: rgba(255,123,114,0.14); color: var(--danger);  border-color: rgba(255,123,114,0.25); }
    .btn.warning { background: rgba(242,204,96,0.14); color: var(--warning); border-color: rgba(242,204,96,0.25); }
    .btn.ghost, .icon-btn { background: var(--panel-2); }

    .btn.compact, .icon-btn.compact {
      padding: 8px 10px; min-height: 38px;
      border-radius: 12px; font-size: 0.92rem;
    }

    .input, .select { width: 100%; padding: 12px 13px; min-height: 46px; outline: none; }

    .header-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px; margin-top: 12px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px; margin-top: 12px;
    }
    .stat { background: var(--panel-2); border: 1px solid var(--border); border-radius: 16px; padding: 12px; }
    .stat .n { font-weight: 800; font-size: 1.15rem; margin-top: 4px; }

    .origin-grid, .shelf-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px; margin-top: 12px;
    }

    .origin-card {
      background: linear-gradient(180deg, #1d2432, #171a21);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px; cursor: pointer; text-align: left;
      display: flex; flex-direction: column; justify-content: space-between;
      gap: 10px; min-height: 90px;
    }
    .origin-card:hover { border-color: var(--accent); }
    .origin-card .count { font-size: 0.9rem; color: var(--muted); }

    .origin-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.75rem; padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid rgba(242,204,96,0.3);
      background: rgba(242,204,96,0.08);
      color: var(--warning); margin-top: 4px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px; margin-top: 10px;
    }

    .shelf-card {
      background: linear-gradient(180deg, #1d2432, #171a21);
      border: 1px solid var(--border);
      border-radius: 18px; padding: 14px;
      cursor: pointer; text-align: left; min-height: 100px;
      display: flex; flex-direction: column; justify-content: space-between;
      gap: 10px;
    }
    .shelf-card.dragging { opacity: 0.35; }
    .shelf-card.drop-target { outline: 2px dashed var(--accent); outline-offset: -4px; }
    .shelf-title { font-size: 1.3rem; font-weight: 800; letter-spacing: 0.02em; }

    .chip-row, .product-summary { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip, .pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 10px; border-radius: 999px;
      border: 1px solid var(--border); background: var(--panel-2);
      color: var(--muted); font-size: 0.83rem;
    }

    .product-list { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }

    .product-card {
      background: linear-gradient(180deg, #1c2130, #151922);
      border: 1px solid var(--border);
      border-radius: 18px; padding: 12px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .product-card.pending { border-color: rgba(242,204,96,0.5); }

    .product-top {
      display: grid; grid-template-columns: 1fr auto;
      gap: 8px; align-items: start;
    }
    .product-title { font-size: 1rem; font-weight: 700; word-break: break-word; }

    .ripiano-badge {
      min-width: 42px; height: 42px;
      border-radius: 14px; display: grid; place-items: center;
      background: rgba(88,166,255,0.14); color: var(--accent);
      border: 1px solid rgba(88,166,255,0.26); font-weight: 800;
    }

    .product-edit { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .product-edit .full { grid-column: 1 / -1; }

    .product-actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .bottom-sheet {
      position: fixed; left: 0; right: 0; bottom: 0;
      z-index: 40;
      padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(15,17,21,0.04), rgba(15,17,21,0.82) 28%, rgba(15,17,21,0.96));
      backdrop-filter: blur(12px);
      pointer-events: none;
    }

    .clipboard {
      max-width: 760px; margin: 0 auto;
      border-radius: 22px; border: 1px solid var(--border);
      background: rgba(17,21,29,0.94);
      box-shadow: var(--shadow);
      overflow: hidden; pointer-events: auto;
      max-height: 220px;
    }
    .clipboard-head {
      padding: 12px 14px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; border-bottom: 1px solid var(--border);
    }
    .clipboard-body {
      max-height: 140px; overflow: auto; padding: 10px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .clipboard-item {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 10px;
      display: grid; grid-template-columns: 1fr auto auto;
      gap: 8px; align-items: center;
    }

    .empty {
      padding: 16px; text-align: center; color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 18px;
      background: rgba(255,255,255,0.02);
    }

    .side-nav {
      position: fixed; top: 50%; transform: translateY(-50%);
      z-index: 55; width: 26px; height: 80px;
      border: 1px solid rgba(88,166,255,0.18);
      background: rgba(17,21,29,0.72);
      color: rgba(241,245,249,0.85);
      backdrop-filter: blur(10px);
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; cursor: pointer; user-select: none; pointer-events: auto;
      transition: width 0.2s ease, background 0.18s ease, opacity 0.18s ease;
      padding: 0; font: inherit;
    }
    .side-nav:hover {
      width: 34px;
      background: rgba(88,166,255,0.16);
      border-color: rgba(88,166,255,0.38);
      color: var(--accent);
    }
    .side-nav:disabled { opacity: 0.22; cursor: default; pointer-events: none; }
    .side-nav.left  { left: 0;  border-left: 0;  border-radius: 0 12px 12px 0; }
    .side-nav.right { right: 0; border-right: 0; border-radius: 12px 0 0 12px; }
    .side-nav-arrow { font-size: 1.1rem; line-height: 1; font-weight: 700; }
    .side-nav-label {
      font-size: 0.55rem; letter-spacing: 0.04em;
      text-transform: uppercase; color: var(--muted);
      writing-mode: vertical-lr; max-height: 50px;
      overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; opacity: 0.8;
    }

    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 90;
      display: grid; place-items: center; padding: 14px;
    }
    .modal {
      width: 100%; max-width: 560px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 24px; padding: 16px;
      box-shadow: var(--shadow);
      max-height: 90vh; overflow: auto;
    }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .modal-grid .full { grid-column: 1 / -1; }

    .note {
      margin-top: 8px; padding: 10px 12px;
      border-radius: 14px;
      background: rgba(88,166,255,0.08);
      border: 1px solid rgba(88,166,255,0.18);
      color: #cfe6ff;
    }
    .note.warn {
      background: rgba(242,204,96,0.08);
      border-color: rgba(242,204,96,0.22);
      color: #fdecc0;
    }
    .note pre { margin: 6px 0 0; white-space: pre-wrap; font-size: 0.78rem; opacity: 0.85; }

    /* Sync status bar */
    .sync-bar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px; align-items: center;
      padding: 10px 12px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      margin-top: 10px;
    }
    .sync-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
      background: var(--muted);
    }
    .sync-dot.online   { background: var(--accent-2); box-shadow: 0 0 6px rgba(126,231,135,0.6); }
    .sync-dot.offline  { background: var(--danger); }
    .sync-dot.pending  { background: var(--warning); }
    .sync-dot.syncing  { background: var(--accent); animation: pulse 1s infinite; }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%     { opacity: 0.35; }
    }

    .pending-marker {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--warning);
      margin-left: 6px;
      vertical-align: middle;
    }

    @media (max-width: 520px) {
      .origin-grid, .shelf-grid, .stats, .product-edit, .modal-grid,
      .header-actions, .product-actions {
        grid-template-columns: 1fr 1fr;
      }
      .toolbar { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <button class="side-nav left" id="sidePrevShelfBtn" aria-label="Scaffale precedente">
    <span class="side-nav-arrow">‹</span>
    <span class="side-nav-label" id="sidePrevLabel"></span>
  </button>
  <button class="side-nav right" id="sideNextShelfBtn" aria-label="Scaffale successivo">
    <span class="side-nav-arrow">›</span>
    <span class="side-nav-label" id="sideNextLabel"></span>
  </button>

  <div class="app">
    <div class="topbar">
      <div class="row space-between">
        <div>
          <h1 id="pageTitle">Magazzino Mobile</h1>
          <p class="muted small" id="pageSubtitle">Supabase · offline-first</p>
        </div>
        <button class="icon-btn compact hidden" id="backBtn">← Indietro</button>
      </div>
    </div>

    <section id="screenHome">
      <div class="panel">
        <div class="sync-bar">
          <div>
            <span class="sync-dot" id="syncDot"></span>
            <strong id="syncStatus">—</strong>
            <div class="tiny muted" id="syncDetails">Configura Supabase per iniziare.</div>
          </div>
          <button class="btn compact primary" id="syncBtn">Sync</button>
        </div>

        <div class="header-actions">
          <button class="btn ghost" id="configBtn">Configura Supabase</button>
          <button class="btn ghost" id="exportBtn">Esporta CSV (backup)</button>
          <button class="btn ghost" id="resetBtn">Svuota cache locale</button>
          <button class="btn ghost" id="helpBtn">Guida SQL</button>
        </div>

        <div class="stats">
          <div class="stat"><div class="muted tiny">Origini</div><div class="n" id="statOrigins">0</div></div>
          <div class="stat"><div class="muted tiny">Scaffali</div><div class="n" id="statShelves">0</div></div>
          <div class="stat"><div class="muted tiny">Prodotti</div><div class="n" id="statProducts">0</div></div>
        </div>
      </div>

      <div class="panel">
        <div class="row space-between">
          <h2>Origini / Capannoni</h2>
          <button class="btn compact primary" id="addOriginBtn">+ Origine</button>
        </div>
        <div id="originGrid" class="origin-grid"></div>
      </div>
    </section>

    <section id="screenOrigin" class="hidden">
      <div class="panel">
        <div class="row space-between">
          <div>
            <h2 id="originTitle">Origine</h2>
            <p class="muted small" id="originMeta"></p>
          </div>
          <button class="btn compact ghost" id="toggleReorderBtn">Riordino: OFF</button>
        </div>

        <div class="toolbar">
          <input id="shelfSearchInput" class="input" placeholder="Cerca scaffale (es. 2f, b, g)" />
          <button class="btn compact" id="addShelfBtn">+ Scaffale</button>
          <button class="btn compact" id="renameShelfBtn">Rinomina</button>
        </div>

        <div class="note hidden" id="reorderNote">In modalità riordino puoi trascinare uno scaffale tra gli altri.</div>
        <div id="shelfGrid" class="shelf-grid"></div>
      </div>
    </section>

    <section id="screenShelf" class="hidden">
      <div class="panel">
        <div class="row space-between">
          <div>
            <h2 id="shelfTitle">Scaffale</h2>
            <p class="muted small" id="shelfMeta"></p>
          </div>
          <button class="btn compact primary" id="addProductBtn">+ Prodotto</button>
        </div>

        <div class="toolbar">
          <input id="productSearchInput" class="input" placeholder="Cerca prodotto, codice o ripiano" />
          <button class="btn compact ghost" id="pasteAllBtn">Incolla tagliati</button>
          <button class="btn compact ghost" id="saveNowBtn">Salva locale</button>
        </div>
      </div>

      <div class="panel">
        <div id="productList" class="product-list"></div>
      </div>
    </section>
  </div>

  <div class="bottom-sheet">
    <div class="clipboard">
      <div class="clipboard-head">
        <div>
          <strong>Tagliati / copiati</strong>
          <div class="tiny muted">Restano in memoria sul dispositivo.</div>
        </div>
        <button class="btn compact danger" id="clearClipboardBtn">Svuota</button>
      </div>
      <div class="clipboard-body" id="clipboardBody"></div>
    </div>
  </div>

  <div id="modalRoot" class="hidden"></div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const STORAGE_KEY = 'magazzino_supabase_v1';
    const CONFIG_KEY  = 'magazzino_supabase_config_v1';

    const state = {
      records: [],
      manualShelves: [],
      manualOrigins: [],
      clipboard: [],
      pendingDeletes: [],      // [ "COD1", "COD2", ... ] codici da cancellare dal DB
      currentScreen: 'home',
      selectedOrigin: null,
      selectedShelfKey: null,
      reorderMode: false,
      dragShelfKey: null,
      filters: { shelfSearch: '', productSearch: '' },
      history: [],
      config: null,            // { url, anonKey, table }
      supabase: null,
      online: navigator.onLine,
      syncing: false,
      lastSyncAt: null,
      lastSyncError: null
    };

    const el = {
      pageTitle: document.getElementById('pageTitle'),
      pageSubtitle: document.getElementById('pageSubtitle'),
      backBtn: document.getElementById('backBtn'),
      screenHome: document.getElementById('screenHome'),
      screenOrigin: document.getElementById('screenOrigin'),
      screenShelf: document.getElementById('screenShelf'),

      syncDot: document.getElementById('syncDot'),
      syncStatus: document.getElementById('syncStatus'),
      syncDetails: document.getElementById('syncDetails'),
      syncBtn: document.getElementById('syncBtn'),
      configBtn: document.getElementById('configBtn'),
      exportBtn: document.getElementById('exportBtn'),
      resetBtn: document.getElementById('resetBtn'),
      helpBtn: document.getElementById('helpBtn'),

      statOrigins: document.getElementById('statOrigins'),
      statShelves: document.getElementById('statShelves'),
      statProducts: document.getElementById('statProducts'),
      originGrid: document.getElementById('originGrid'),
      addOriginBtn: document.getElementById('addOriginBtn'),
      originTitle: document.getElementById('originTitle'),
      originMeta: document.getElementById('originMeta'),
      shelfSearchInput: document.getElementById('shelfSearchInput'),
      addShelfBtn: document.getElementById('addShelfBtn'),
      renameShelfBtn: document.getElementById('renameShelfBtn'),
      shelfGrid: document.getElementById('shelfGrid'),
      toggleReorderBtn: document.getElementById('toggleReorderBtn'),
      reorderNote: document.getElementById('reorderNote'),
      shelfTitle: document.getElementById('shelfTitle'),
      shelfMeta: document.getElementById('shelfMeta'),
      productSearchInput: document.getElementById('productSearchInput'),
      productList: document.getElementById('productList'),
      addProductBtn: document.getElementById('addProductBtn'),
      pasteAllBtn: document.getElementById('pasteAllBtn'),
      saveNowBtn: document.getElementById('saveNowBtn'),
      clipboardBody: document.getElementById('clipboardBody'),
      clearClipboardBtn: document.getElementById('clearClipboardBtn'),
      sidePrevShelfBtn: document.getElementById('sidePrevShelfBtn'),
      sideNextShelfBtn: document.getElementById('sideNextShelfBtn'),
      sidePrevLabel: document.getElementById('sidePrevLabel'),
      sideNextLabel: document.getElementById('sideNextLabel'),
      modalRoot: document.getElementById('modalRoot')
    };

    /* ── Utilities ── */
    function uid() { return 'r_' + Math.random().toString(36).slice(2, 11) + Date.now().toString(36); }
    function clone(v) { return JSON.parse(JSON.stringify(v)); }
    function normalizeText(v) { return String(v ?? '').trim(); }
    function normalizeOrigin(v) { return normalizeText(v || 'senza_origine'); }
    function nowIso() { return new Date().toISOString(); }

    function ensureTimestamp(record, isNew = false) {
      if (isNew && !record.created_at) record.created_at = nowIso();
      record.updated_at = nowIso();
      return record;
    }

    function letterToIndex(letter) {
      if (!letter) return 999;
      return letter.toLowerCase().charCodeAt(0) - 97;
    }
    function indexToLetter(index) {
      return String.fromCharCode(97 + Math.max(0, Number(index) || 0));
    }

    function parsePosition(position) {
      const value = normalizeText(position).toLowerCase();
      const m1 = value.match(/^(\d+)([a-z])(\d+)$/i);
      if (m1) {
        return { raw: value, type: 'row_shelf_level', row: m1[1], shelfLetter: m1[2].toLowerCase(), shelfKey: `${m1[1]}${m1[2].toLowerCase()}`, shelfLabel: `${m1[1]}${m1[2].toLowerCase()}`, level: m1[3], sortRow: Number(m1[1]), sortShelf: letterToIndex(m1[2]), sortLevel: Number(m1[3]) };
      }
      const m2 = value.match(/^([a-z])(\d+)$/i);
      if (m2) {
        return { raw: value, type: 'shelf_level', row: '', shelfLetter: m2[1].toLowerCase(), shelfKey: m2[1].toLowerCase(), shelfLabel: m2[1].toLowerCase(), level: m2[2], sortRow: 0, sortShelf: letterToIndex(m2[1]), sortLevel: Number(m2[2]) };
      }
      return { raw: value, type: 'unknown', row: '', shelfLetter: '', shelfKey: value, shelfLabel: value, level: '', sortRow: 999999, sortShelf: 999999, sortLevel: 999999 };
    }

    function parseShelfKey(key) {
      const value = normalizeText(key).toLowerCase();
      const m1 = value.match(/^(\d+)([a-z])$/i);
      if (m1) return { type: 'row_shelf', row: m1[1], shelfLetter: m1[2].toLowerCase(), shelfKey: value };
      const m2 = value.match(/^([a-z])$/i);
      if (m2) return { type: 'shelf', row: '', shelfLetter: m2[1].toLowerCase(), shelfKey: value };
      return null;
    }

    function buildPosition(parsed, level) {
      const lv = normalizeText(level) || '1';
      if (parsed.type === 'row_shelf' || parsed.type === 'row_shelf_level') return `${parsed.row}${parsed.shelfLetter}${lv}`.toLowerCase();
      return `${parsed.shelfLetter}${lv}`.toLowerCase();
    }

    function normalizeRecord(record) {
      const out = {
        _id: record._id || uid(),
        _pendingOp: record._pendingOp || null,       // 'upsert' | null
        _remoteCodice: record._remoteCodice ?? null, // il codice con cui il record è noto al server (null se mai syncato)
        codice: normalizeText(record.codice),
        nome: normalizeText(record.nome),
        lunghezza: normalizeText(record.lunghezza),
        larghezza: normalizeText(record.larghezza),
        spessore: normalizeText(record.spessore),
        posizione: normalizeText(record.posizione).toLowerCase(),
        quantita_pz: normalizeText(record.quantita_pz),
        origine: normalizeOrigin(record.origine),
        created_at: normalizeText(record.created_at),
        updated_at: normalizeText(record.updated_at)
      };
      out._parsed = parsePosition(out.posizione);
      return out;
    }

    function normalizeManualShelf(shelf) {
      const parsed = parseShelfKey(shelf.key);
      return {
        _id: shelf._id || uid(),
        origine: normalizeOrigin(shelf.origine),
        key: parsed.shelfKey,
        row: parsed.row,
        shelfLetter: parsed.shelfLetter,
        type: parsed.type === 'row_shelf' ? 'row_shelf_level' : 'shelf_level'
      };
    }

    function normalizeManualOrigin(origin) {
      return {
        _id: origin._id || uid(),
        name: normalizeOrigin(origin.name),
        createdAt: origin.createdAt || nowIso()
      };
    }

    function markPending(record) {
      record._pendingOp = 'upsert';
      return record;
    }

    function schedulePendingDelete(codice) {
      const c = normalizeText(codice);
      if (!c) return;
      if (!state.pendingDeletes.includes(c)) state.pendingDeletes.push(c);
    }

    /* ── Persistenza ── */
    function pushHistory() {
      state.history.push({
        records: clone(state.records),
        manualShelves: clone(state.manualShelves),
        manualOrigins: clone(state.manualOrigins),
        clipboard: clone(state.clipboard),
        pendingDeletes: clone(state.pendingDeletes)
      });
      if (state.history.length > 30) state.history.shift();
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        records: state.records,
        manualShelves: state.manualShelves,
        manualOrigins: state.manualOrigins,
        clipboard: state.clipboard,
        pendingDeletes: state.pendingDeletes,
        lastSyncAt: state.lastSyncAt
      }));
      renderStats();
      renderSyncBar();
    }

    function restore() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      try {
        const parsed = JSON.parse(raw);
        state.records = Array.isArray(parsed.records) ? parsed.records.map(normalizeRecord) : [];
        state.manualShelves = Array.isArray(parsed.manualShelves) ? parsed.manualShelves.map(normalizeManualShelf) : [];
        state.manualOrigins = Array.isArray(parsed.manualOrigins) ? parsed.manualOrigins.map(normalizeManualOrigin) : [];
        state.clipboard = Array.isArray(parsed.clipboard) ? parsed.clipboard : [];
        state.pendingDeletes = Array.isArray(parsed.pendingDeletes) ? parsed.pendingDeletes : [];
        state.lastSyncAt = parsed.lastSyncAt || null;
      } catch (e) { console.error(e); }
    }

    function persistConfig() {
      if (state.config) localStorage.setItem(CONFIG_KEY, JSON.stringify(state.config));
      else localStorage.removeItem(CONFIG_KEY);
    }

    function restoreConfig() {
      const raw = localStorage.getItem(CONFIG_KEY);
      if (!raw) return;
      try {
        const parsed = JSON.parse(raw);
        if (parsed?.url && parsed?.anonKey && parsed?.table) state.config = parsed;
      } catch (e) { console.error(e); }
    }

    function buildSupabaseClient() {
      if (!state.config) { state.supabase = null; return; }
      state.supabase = createClient(state.config.url, state.config.anonKey, {
        auth: { persistSession: false }
      });
    }

    /* ── Dati derivati ── */
    function getOrigins() {
      const map = new Map();
      state.records.forEach(r => {
        const o = normalizeOrigin(r.origine);
        map.set(o, (map.get(o) || 0) + 1);
      });
      state.manualShelves.forEach(s => {
        const o = normalizeOrigin(s.origine);
        if (!map.has(o)) map.set(o, 0);
      });
      state.manualOrigins.forEach(mo => {
        if (!map.has(mo.name)) map.set(mo.name, 0);
      });
      return [...map.entries()]
        .map(([name, count]) => ({ name, count }))
        .sort((a, b) => a.name.localeCompare(b.name, 'it'));
    }

    function isManualOnlyOrigin(name) {
      return state.manualOrigins.some(mo => mo.name === name);
    }
    function isOriginDeletable(name) {
      const hasRecords = state.records.some(r => r.origine === name);
      const hasShelves = state.manualShelves.some(s => s.origine === name);
      return isManualOnlyOrigin(name) && !hasRecords && !hasShelves;
    }
    function getRecordsByOrigin(origin) { return state.records.filter(r => r.origine === origin); }

    function getShelvesForOrigin(origin) {
      const map = new Map();
      getRecordsByOrigin(origin).forEach(record => {
        const p = record._parsed;
        if (!map.has(p.shelfKey)) map.set(p.shelfKey, { key: p.shelfKey, label: p.shelfLabel, row: p.row, shelfLetter: p.shelfLetter, parsed: p, products: 0, levels: new Set() });
        const shelf = map.get(p.shelfKey);
        shelf.products += 1;
        if (p.level) shelf.levels.add(String(p.level));
      });
      state.manualShelves.filter(s => s.origine === origin).forEach(shelf => {
        if (!map.has(shelf.key)) {
          const parsed = shelf.type === 'row_shelf_level' ? parsePosition(`${shelf.row}${shelf.shelfLetter}1`) : parsePosition(`${shelf.shelfLetter}1`);
          map.set(shelf.key, { key: shelf.key, label: shelf.key, row: shelf.row, shelfLetter: shelf.shelfLetter, parsed, products: 0, levels: new Set() });
        }
      });
      return [...map.values()].sort((a, b) => a.parsed.sortRow - b.parsed.sortRow || a.parsed.sortShelf - b.parsed.sortShelf);
    }

    function getCurrentShelfRecords() {
      if (!state.selectedOrigin || !state.selectedShelfKey) return [];
      return state.records.filter(r => r.origine === state.selectedOrigin && r._parsed.shelfKey === state.selectedShelfKey);
    }

    function pendingUpsertsCount() {
      return state.records.filter(r => r._pendingOp === 'upsert').length;
    }

    /* ── Stats + Sync bar ── */
    function renderStats() {
      const shelves = new Set([
        ...state.records.map(r => `${r.origine}__${r._parsed.shelfKey}`),
        ...state.manualShelves.map(s => `${s.origine}__${s.key}`)
      ]);
      el.statOrigins.textContent = getOrigins().length;
      el.statShelves.textContent = shelves.size;
      el.statProducts.textContent = state.records.length;
    }

    function renderSyncBar() {
      const pendingUp = pendingUpsertsCount();
      const pendingDel = state.pendingDeletes.length;
      const totPending = pendingUp + pendingDel;

      if (!state.config) {
        el.syncDot.className = 'sync-dot';
        el.syncStatus.textContent = 'Non configurato';
        el.syncDetails.textContent = 'Tocca "Configura Supabase" per collegare il database.';
        el.syncBtn.disabled = true;
        return;
      }
      if (state.syncing) {
        el.syncDot.className = 'sync-dot syncing';
        el.syncStatus.textContent = 'Sincronizzazione…';
        el.syncDetails.textContent = 'Invio modifiche e aggiornamento dati.';
        el.syncBtn.disabled = true;
        return;
      }
      if (!state.online) {
        el.syncDot.className = 'sync-dot offline';
        el.syncStatus.textContent = 'Offline';
        el.syncDetails.textContent = totPending ? `${totPending} modifiche in coda, verranno inviate al ripristino.` : 'Le modifiche locali restano in cache.';
        el.syncBtn.disabled = true;
        return;
      }
      if (totPending > 0) {
        el.syncDot.className = 'sync-dot pending';
        el.syncStatus.textContent = `${totPending} modifiche in coda`;
        el.syncDetails.textContent = state.lastSyncAt ? `Ultimo sync: ${formatDate(state.lastSyncAt)}` : 'Mai sincronizzato.';
        el.syncBtn.disabled = false;
        return;
      }
      if (state.lastSyncError) {
        el.syncDot.className = 'sync-dot offline';
        el.syncStatus.textContent = 'Errore ultimo sync';
        el.syncDetails.textContent = state.lastSyncError;
        el.syncBtn.disabled = false;
        return;
      }
      el.syncDot.className = 'sync-dot online';
      el.syncStatus.textContent = 'Sincronizzato';
      el.syncDetails.textContent = state.lastSyncAt ? `Ultimo sync: ${formatDate(state.lastSyncAt)}` : 'Premi Sync per scaricare i dati.';
      el.syncBtn.disabled = false;
    }

    function formatDate(iso) {
      try {
        const d = new Date(iso);
        return d.toLocaleString('it-IT', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
      } catch { return iso; }
    }

    function escapeHtml(str) {
      return String(str ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    /* ── Layout ── */
    function updateLayout() {
      el.screenHome.classList.toggle('hidden', state.currentScreen !== 'home');
      el.screenOrigin.classList.toggle('hidden', state.currentScreen !== 'origin');
      el.screenShelf.classList.toggle('hidden', state.currentScreen !== 'shelf');
      el.backBtn.classList.toggle('hidden', state.currentScreen === 'home');

      const showSides = state.currentScreen === 'shelf';
      el.sidePrevShelfBtn.style.display = showSides ? 'flex' : 'none';
      el.sideNextShelfBtn.style.display = showSides ? 'flex' : 'none';

      if (showSides && state.selectedOrigin && state.selectedShelfKey) {
        const shelves = getShelvesForOrigin(state.selectedOrigin);
        const idx = shelves.findIndex(s => s.key === state.selectedShelfKey);
        const prev = shelves[idx - 1];
        const next = shelves[idx + 1];
        el.sidePrevShelfBtn.disabled = !prev;
        el.sideNextShelfBtn.disabled = !next;
        el.sidePrevLabel.textContent = prev ? prev.label : '';
        el.sideNextLabel.textContent = next ? next.label : '';
      }

      if (state.currentScreen === 'home') {
        el.pageTitle.textContent = 'Magazzino Mobile';
        el.pageSubtitle.textContent = state.config ? `Supabase · ${state.config.table}` : 'Supabase · non configurato';
      } else if (state.currentScreen === 'origin') {
        el.pageTitle.textContent = 'Scaffali';
        el.pageSubtitle.textContent = state.selectedOrigin || '';
      } else {
        el.pageTitle.textContent = 'Contenuto scaffale';
        el.pageSubtitle.textContent = `${state.selectedOrigin || ''} · ${state.selectedShelfKey || ''}`;
      }
    }

    /* ── Render Home ── */
    function renderHome() {
      const origins = getOrigins();
      if (!origins.length) {
        el.originGrid.innerHTML = '<div class="empty" style="grid-column:1 / -1;">Nessun dato. Premi <strong>Sync</strong> per scaricare dal DB oppure crea un\'origine manuale.</div>';
        return;
      }
      el.originGrid.innerHTML = origins.map(o => {
        const isManual = isManualOnlyOrigin(o.name);
        const isDeletable = isOriginDeletable(o.name);
        return `<div class="origin-card" data-origin="${escapeHtml(o.name)}">
          <div>
            <strong>${escapeHtml(o.name)}</strong>
            ${isManual ? '<div class="origin-badge">⏳ manuale</div>' : ''}
            <div class="count" style="margin-top:6px;">${o.count} prodotti</div>
          </div>
          <div class="chip-row">
            <button class="btn compact primary" style="flex:1;" data-open-origin="${escapeHtml(o.name)}">Apri</button>
            ${isDeletable ? `<button class="btn compact danger" data-delete-origin="${escapeHtml(o.name)}">Elimina</button>` : ''}
          </div>
        </div>`;
      }).join('');

      el.originGrid.querySelectorAll('[data-open-origin]').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          state.selectedOrigin = btn.dataset.openOrigin;
          state.currentScreen = 'origin';
          state.selectedShelfKey = null;
          render();
        };
      });
      el.originGrid.querySelectorAll('[data-delete-origin]').forEach(btn => {
        btn.onclick = (e) => { e.stopPropagation(); deleteManualOrigin(btn.dataset.deleteOrigin); };
      });
      el.originGrid.querySelectorAll('.origin-card').forEach(card => {
        card.onclick = (e) => {
          if (!e.target.closest('button')) {
            state.selectedOrigin = card.dataset.origin;
            state.currentScreen = 'origin';
            state.selectedShelfKey = null;
            render();
          }
        };
      });
    }

    /* ── Render Origin ── */
    function renderOrigin() {
      if (!state.selectedOrigin) return;
      const shelves = getShelvesForOrigin(state.selectedOrigin);
      const q = normalizeText(el.shelfSearchInput.value).toLowerCase();
      const filtered = q ? shelves.filter(s => s.label.includes(q)) : shelves;
      el.originTitle.textContent = state.selectedOrigin;
      el.originMeta.textContent = `${shelves.length} scaffali · ${getRecordsByOrigin(state.selectedOrigin).length} prodotti`;
      el.reorderNote.classList.toggle('hidden', !state.reorderMode);
      el.toggleReorderBtn.textContent = `Riordino: ${state.reorderMode ? 'ON' : 'OFF'}`;
      if (!filtered.length) {
        el.shelfGrid.innerHTML = '<div class="empty" style="grid-column:1 / -1;">Nessuno scaffale trovato.</div>';
        return;
      }
      el.shelfGrid.innerHTML = filtered.map(s => {
        const levels = [...s.levels].sort((a, b) => Number(a) - Number(b));
        return `<div class="shelf-card" data-shelf-key="${escapeHtml(s.key)}" draggable="${state.reorderMode}">
          <div><div class="shelf-title">${escapeHtml(s.label)}</div><div class="chip-row" style="margin-top:8px;"><span class="chip">${s.products} prodotti</span><span class="chip">Ripiani: ${levels.length ? levels.join(', ') : '—'}</span></div></div>
          <div class="chip-row"><button class="btn compact ghost" data-open-shelf="${escapeHtml(s.key)}">Apri</button><button class="btn compact warning" data-rename-shelf="${escapeHtml(s.key)}">Rinomina</button></div>
        </div>`;
      }).join('');

      el.shelfGrid.querySelectorAll('[data-open-shelf]').forEach(btn => btn.onclick = (e) => { e.stopPropagation(); openShelf(btn.dataset.openShelf); });
      el.shelfGrid.querySelectorAll('[data-rename-shelf]').forEach(btn => btn.onclick = (e) => { e.stopPropagation(); promptRenameShelf(btn.dataset.renameShelf); });
      el.shelfGrid.querySelectorAll('.shelf-card').forEach(card => {
        const key = card.dataset.shelfKey;
        card.onclick = (e) => { if (!e.target.closest('button')) openShelf(key); };
        if (state.reorderMode) {
          card.ondragstart = () => { state.dragShelfKey = key; card.classList.add('dragging'); };
          card.ondragend = () => { state.dragShelfKey = null; card.classList.remove('dragging'); document.querySelectorAll('.drop-target').forEach(n => n.classList.remove('drop-target')); };
          card.ondragover = (e) => { e.preventDefault(); if (state.dragShelfKey && state.dragShelfKey !== key) card.classList.add('drop-target'); };
          card.ondragleave = () => card.classList.remove('drop-target');
          card.ondrop = (e) => { e.preventDefault(); card.classList.remove('drop-target'); if (state.dragShelfKey && state.dragShelfKey !== key) reorderShelves(state.dragShelfKey, key); };
        }
      });
    }

    /* ── Render Shelf ── */
    function renderShelf() {
      if (!state.selectedOrigin || !state.selectedShelfKey) return;
      const shelves = getShelvesForOrigin(state.selectedOrigin);
      const currentIndex = shelves.findIndex(s => s.key === state.selectedShelfKey);
      const shelf = shelves[currentIndex];
      const records = getCurrentShelfRecords();
      el.shelfTitle.textContent = `Scaffale ${shelf ? shelf.label : state.selectedShelfKey}`;
      el.shelfMeta.textContent = `${state.selectedOrigin} · ${records.length} prodotti · ${currentIndex + 1}/${shelves.length}`;
      el.sidePrevShelfBtn.disabled = currentIndex <= 0;
      el.sideNextShelfBtn.disabled = currentIndex >= shelves.length - 1;

      const q = normalizeText(el.productSearchInput.value).toLowerCase();
      const filtered = q ? records.filter(r => [r.nome, r.codice, r.posizione, r.quantita_pz].join(' ').toLowerCase().includes(q)) : records;
      if (!filtered.length) {
        el.productList.innerHTML = '<div class="empty">Nessun prodotto in questo scaffale.</div>';
        return;
      }
      const sorted = [...filtered].sort((a, b) => a._parsed.sortLevel - b._parsed.sortLevel || a.nome.localeCompare(b.nome, 'it'));
      el.productList.innerHTML = sorted.map(r => {
        const p = r._parsed;
        const pending = r._pendingOp === 'upsert';
        return `<div class="product-card${pending ? ' pending' : ''}" data-product-id="${escapeHtml(r._id)}">
          <div class="product-top">
            <div>
              <div class="product-title">${escapeHtml(r.nome || '(senza nome)')}${pending ? '<span class="pending-marker" title="Non ancora sincronizzato"></span>' : ''}</div>
              <div class="product-summary" style="margin-top:8px;"><span class="pill">Codice: ${escapeHtml(r.codice || '-')}</span><span class="pill">Posizione: ${escapeHtml(r.posizione || '-')}</span><span class="pill">Q.tà: ${escapeHtml(r.quantita_pz || '-')}</span></div>
            </div>
            <div class="ripiano-badge">${escapeHtml(p.level || '?')}</div>
          </div>
          <div class="product-edit">
            <input class="input full" data-field="nome" value="${escapeHtml(r.nome)}" placeholder="Nome prodotto" />
            <input class="input" data-field="lunghezza" value="${escapeHtml(r.lunghezza)}" placeholder="Lunghezza" />
            <input class="input" data-field="larghezza" value="${escapeHtml(r.larghezza)}" placeholder="Larghezza" />
            <input class="input" data-field="spessore" value="${escapeHtml(r.spessore)}" placeholder="Spessore" />
            <input class="input" data-field="quantita_pz" value="${escapeHtml(r.quantita_pz)}" placeholder="Quantità" />
            <input class="input" data-field="codice" value="${escapeHtml(r.codice)}" placeholder="Codice (PK)" />
            <input class="input" data-field="ripiano" value="${escapeHtml(p.level)}" placeholder="Ripiano" />
            <input class="input full" data-field="posizione" value="${escapeHtml(r.posizione)}" placeholder="Posizione completa" />
          </div>
          <div class="product-actions">
            <button class="btn compact primary" data-save-product="${escapeHtml(r._id)}">Salva</button>
            <button class="btn compact" data-cut-product="${escapeHtml(r._id)}">Taglia</button>
            <button class="btn compact warning" data-copy-product="${escapeHtml(r._id)}">Copia</button>
            <button class="btn compact danger" data-delete-product="${escapeHtml(r._id)}">Elimina</button>
          </div>
        </div>`;
      }).join('');
      attachProductEvents();
    }

    /* ── Render Clipboard ── */
    function renderClipboard() {
      if (!state.clipboard.length) {
        el.clipboardBody.innerHTML = '<div class="empty">Nessun prodotto tagliato o copiato.</div>';
        return;
      }
      el.clipboardBody.innerHTML = state.clipboard.map((item, i) =>
        `<div class="clipboard-item">
          <div>
            <div><strong>${escapeHtml(item.record.nome || '(senza nome)')}</strong></div>
            <div class="tiny muted">${escapeHtml(item.mode.toUpperCase())} · ${escapeHtml(item.sourceOrigin)} · ${escapeHtml(item.sourcePosition)}</div>
          </div>
          <button class="btn compact primary" data-paste-index="${i}">Incolla</button>
          <button class="btn compact ghost" data-remove-clip-index="${i}">×</button>
        </div>`
      ).join('');
      el.clipboardBody.querySelectorAll('[data-paste-index]').forEach(btn => btn.onclick = () => pasteClipboardItem(Number(btn.dataset.pasteIndex)));
      el.clipboardBody.querySelectorAll('[data-remove-clip-index]').forEach(btn => btn.onclick = () => {
        pushHistory();
        state.clipboard.splice(Number(btn.dataset.removeClipIndex), 1);
        persist();
        renderClipboard();
      });
    }

    function render() {
      renderStats();
      renderSyncBar();
      renderHome();
      renderOrigin();
      renderShelf();
      renderClipboard();
      updateLayout();
    }

    /* ── Navigazione ── */
    function openShelf(key) {
      state.selectedShelfKey = key;
      state.currentScreen = 'shelf';
      el.productSearchInput.value = '';
      render();
    }
    function goToAdjacentShelf(direction) {
      const shelves = getShelvesForOrigin(state.selectedOrigin);
      const idx = shelves.findIndex(s => s.key === state.selectedShelfKey);
      const next = idx + direction;
      if (next < 0 || next >= shelves.length) return;
      openShelf(shelves[next].key);
    }

    /* ── Prodotti ── */
    function saveProductInline(id) {
      const card = el.productList.querySelector(`[data-product-id="${CSS.escape(id)}"]`);
      const record = state.records.find(r => r._id === id);
      if (!card || !record) return;
      pushHistory();
      const fields = {};
      card.querySelectorAll('[data-field]').forEach(input => fields[input.dataset.field] = normalizeText(input.value));

      const newCodice = fields.codice;
      if (!newCodice) { alert('Il codice è obbligatorio (è la PK nel DB).'); state.history.pop(); return; }

      // Se è cambiato il codice → controlla duplicato
      if (newCodice !== record.codice) {
        const conflict = state.records.some(r => r._id !== record._id && r.codice === newCodice);
        if (conflict) { alert(`Esiste già un prodotto con codice "${newCodice}".`); state.history.pop(); return; }
        // Il vecchio codice remoto va cancellato al prossimo sync
        if (record._remoteCodice && record._remoteCodice !== newCodice) {
          schedulePendingDelete(record._remoteCodice);
        }
      }

      record.nome = fields.nome;
      record.lunghezza = fields.lunghezza;
      record.larghezza = fields.larghezza;
      record.spessore = fields.spessore;
      record.quantita_pz = fields.quantita_pz;
      record.codice = newCodice;

      const parsedPosition = fields.posizione ? parsePosition(fields.posizione) : record._parsed;
      const base = parsedPosition.type !== 'unknown' ? parsedPosition : record._parsed;
      record.posizione = buildPosition(base, fields.ripiano || base.level || '1');
      record._parsed = parsePosition(record.posizione);
      ensureTimestamp(record);
      markPending(record);
      persist();
      render();
    }

    function attachProductEvents() {
      el.productList.querySelectorAll('[data-save-product]').forEach(btn => btn.onclick = () => saveProductInline(btn.dataset.saveProduct));
      el.productList.querySelectorAll('[data-cut-product]').forEach(btn => btn.onclick = () => cutProduct(btn.dataset.cutProduct));
      el.productList.querySelectorAll('[data-copy-product]').forEach(btn => btn.onclick = () => copyProduct(btn.dataset.copyProduct));
      el.productList.querySelectorAll('[data-delete-product]').forEach(btn => btn.onclick = () => deleteProduct(btn.dataset.deleteProduct));
    }

    function copyProduct(id) {
      const record = state.records.find(r => r._id === id);
      if (!record) return;
      pushHistory();
      state.clipboard.unshift({ mode: 'copy', record: clone(record), sourceOrigin: record.origine, sourcePosition: record.posizione });
      if (state.clipboard.length > 20) state.clipboard.pop();
      persist();
      renderClipboard();
    }

    function cutProduct(id) {
      const index = state.records.findIndex(r => r._id === id);
      if (index === -1) return;
      pushHistory();
      const [record] = state.records.splice(index, 1);
      state.clipboard.unshift({ mode: 'cut', record: clone(record), sourceOrigin: record.origine, sourcePosition: record.posizione });
      if (state.clipboard.length > 20) state.clipboard.pop();
      // Nota: il record è solo tolto dalla UI. Non schedulo delete finché non viene incollato altrove,
      // perché "taglia" → spostamento. Se la persona svuota la clipboard, schedulo delete lì.
      persist();
      render();
    }

    function deleteProduct(id) {
      if (!confirm('Eliminare questo prodotto? (Verrà rimosso anche dal DB al prossimo sync)')) return;
      pushHistory();
      const record = state.records.find(r => r._id === id);
      if (record && record._remoteCodice) schedulePendingDelete(record._remoteCodice);
      state.records = state.records.filter(r => r._id !== id);
      persist();
      render();
    }

    function pasteClipboardItem(index) {
      if (!state.selectedOrigin || !state.selectedShelfKey) return;
      const item = state.clipboard[index];
      if (!item) return;
      const shelf = getShelvesForOrigin(state.selectedOrigin).find(s => s.key === state.selectedShelfKey);
      if (!shelf) return;
      pushHistory();
      const base = shelf.parsed;
      const originalParsed = item.record._parsed || parsePosition(item.record.posizione);

      if (item.mode === 'cut') {
        // Ripristino del record con nuova posizione/origine, mantenendo codice (PK)
        const record = normalizeRecord({
          ...clone(item.record),
          origine: state.selectedOrigin,
          posizione: buildPosition(base, originalParsed.level || '1'),
          updated_at: nowIso()
        });
        markPending(record);
        state.records.push(record);
        state.clipboard.splice(index, 1);
      } else {
        // Copia → nuovo codice obbligatorio (PK univoca)
        const baseCode = item.record.codice || 'COPY';
        let suggested = `${baseCode}-2`;
        let n = 2;
        while (state.records.some(r => r.codice === suggested)) { n++; suggested = `${baseCode}-${n}`; }
        const newCodice = prompt(`Inserisci un NUOVO codice per la copia (il codice è la PK e deve essere univoco):`, suggested);
        if (!newCodice) { state.history.pop(); return; }
        if (state.records.some(r => r.codice === newCodice.trim())) { alert('Codice già esistente.'); state.history.pop(); return; }
        const record = normalizeRecord({
          ...clone(item.record),
          _id: uid(),
          _remoteCodice: null,    // nuovo record, mai syncato
          codice: newCodice.trim(),
          origine: state.selectedOrigin,
          posizione: buildPosition(base, originalParsed.level || '1'),
          created_at: nowIso(),
          updated_at: nowIso()
        });
        markPending(record);
        state.records.push(record);
      }

      state.manualShelves = state.manualShelves.filter(s => !(s.origine === state.selectedOrigin && s.key === state.selectedShelfKey));
      persist();
      render();
    }

    function pasteAllClipboard() { while (state.clipboard.length) pasteClipboardItem(0); }

    /* ── Origini manuali ── */
    function addOrigin() {
      openModal(`
        <h3>Nuova origine / capannone</h3>
        <p class="muted small" style="margin-top:6px;">L'origine esiste solo come "area vuota" finché non ci metti prodotti. Non viene salvata sul DB.</p>
        <div class="modal-grid">
          <div class="full">
            <input id="newOriginName" class="input" placeholder="es. temporanee, capannone_b, reso" autocomplete="off" />
          </div>
        </div>
        <div class="row" style="margin-top:14px; justify-content:flex-end;">
          <button class="btn ghost" data-close-modal>Annulla</button>
          <button class="btn primary" id="confirmAddOriginBtn">Crea origine</button>
        </div>
      `, () => {
        const input = document.getElementById('newOriginName');
        input.focus();
        document.getElementById('confirmAddOriginBtn').onclick = () => {
          const name = normalizeOrigin(input.value);
          if (!name || name === 'senza_origine') return alert('Nome origine non valido.');
          if (getOrigins().some(o => o.name === name)) return alert('Origine già esistente.');
          pushHistory();
          state.manualOrigins.push(normalizeManualOrigin({ name }));
          persist();
          closeModal();
          render();
        };
        input.onkeydown = (e) => { if (e.key === 'Enter') document.getElementById('confirmAddOriginBtn').click(); };
      });
    }

    function deleteManualOrigin(name) {
      if (!isOriginDeletable(name)) return alert('Impossibile eliminare: l\'origine contiene prodotti o scaffali.');
      if (!confirm(`Eliminare l'origine "${name}"?`)) return;
      pushHistory();
      state.manualOrigins = state.manualOrigins.filter(mo => mo.name !== name);
      persist();
      render();
    }

    /* ── Scaffali ── */
    function reorderShelves(sourceKey, targetKey) {
      const shelves = getShelvesForOrigin(state.selectedOrigin);
      const sourceShelf = shelves.find(s => s.key === sourceKey);
      const targetShelf = shelves.find(s => s.key === targetKey);
      if (!sourceShelf || !targetShelf) return;
      if (sourceShelf.parsed.type !== targetShelf.parsed.type) return alert('Formati scaffale diversi.');
      if (sourceShelf.parsed.type === 'row_shelf_level' && sourceShelf.row !== targetShelf.row) return alert('Riordino consentito solo nella stessa fila.');
      const sameGroup = shelves.filter(s => sourceShelf.parsed.type === 'row_shelf_level' ? s.row === sourceShelf.row && s.parsed.type === sourceShelf.parsed.type : s.parsed.type === sourceShelf.parsed.type).sort((a, b) => a.parsed.sortShelf - b.parsed.sortShelf);
      const order = sameGroup.map(s => s.key);
      const from = order.indexOf(sourceKey);
      const to = order.indexOf(targetKey);
      if (from === -1 || to === -1 || from === to) return;
      pushHistory();
      order.splice(to, 0, order.splice(from, 1)[0]);
      const map = new Map();
      order.forEach((oldKey, i) => {
        const letter = indexToLetter(i);
        const oldShelf = sameGroup.find(s => s.key === oldKey);
        const newKey = sourceShelf.parsed.type === 'row_shelf_level' ? `${oldShelf.row}${letter}` : letter;
        map.set(oldKey, { newKey, letter });
      });
      state.records.forEach(r => {
        if (r.origine !== state.selectedOrigin) return;
        const m = map.get(r._parsed.shelfKey);
        if (!m) return;
        const p = { ...r._parsed, shelfLetter: m.letter };
        r.posizione = buildPosition(p, r._parsed.level || '1');
        r._parsed = parsePosition(r.posizione);
        ensureTimestamp(r);
        markPending(r);
      });
      state.manualShelves = state.manualShelves.map(s => {
        if (s.origine !== state.selectedOrigin) return s;
        const m = map.get(s.key);
        return m ? normalizeManualShelf({ ...s, key: m.newKey }) : s;
      });
      if (map.has(state.selectedShelfKey)) state.selectedShelfKey = map.get(state.selectedShelfKey).newKey;
      persist();
      render();
    }

    function promptRenameShelf(currentKey = '') {
      const shelves = getShelvesForOrigin(state.selectedOrigin);
      const options = shelves.map(s => `<option value="${escapeHtml(s.key)}">${escapeHtml(s.label)}</option>`).join('');
      openModal(`
        <h3>Rinomina scaffale</h3>
        <div class="modal-grid">
          <div class="full"><select id="renameFrom" class="select">${options}</select></div>
          <div class="full"><input id="renameTo" class="input" placeholder="es. 2g oppure c" /></div>
        </div>
        <div class="row" style="margin-top:14px; justify-content:flex-end;">
          <button class="btn ghost" data-close-modal>Annulla</button>
          <button class="btn primary" id="confirmRenameShelfBtn">Conferma</button>
        </div>
      `, () => {
        const fromEl = document.getElementById('renameFrom');
        if (currentKey) fromEl.value = currentKey;
        document.getElementById('confirmRenameShelfBtn').onclick = () =>
          renameShelf(normalizeText(fromEl.value).toLowerCase(), normalizeText(document.getElementById('renameTo').value).toLowerCase());
      });
    }

    function renameShelf(fromKey, toKey) {
      const from = parseShelfKey(fromKey);
      const to = parseShelfKey(toKey);
      if (!from || !to) return alert('Formato scaffale non valido.');
      if (from.type !== to.type) return alert('Formato diverso.');
      if (from.type === 'row_shelf' && from.row !== to.row) return alert('La fila deve restare la stessa.');
      pushHistory();
      let touched = 0;
      state.records.forEach(r => {
        if (r.origine !== state.selectedOrigin || r._parsed.shelfKey !== fromKey) return;
        const updated = { ...r._parsed, row: to.row, shelfLetter: to.shelfLetter, type: to.type === 'row_shelf' ? 'row_shelf_level' : 'shelf_level' };
        r.posizione = buildPosition(updated, r._parsed.level || '1');
        r._parsed = parsePosition(r.posizione);
        ensureTimestamp(r);
        markPending(r);
        touched++;
      });
      state.manualShelves = state.manualShelves.map(s => {
        if (s.origine === state.selectedOrigin && s.key === fromKey) { touched++; return normalizeManualShelf({ ...s, key: toKey }); }
        return s;
      });
      if (!touched) { state.history.pop(); return alert('Nessun elemento trovato.'); }
      if (state.selectedShelfKey === fromKey) state.selectedShelfKey = toKey;
      persist(); closeModal(); render();
    }

    function createShelf(key) {
      const parsed = parseShelfKey(key);
      if (!parsed) return alert('Formato scaffale non valido.');
      if (getShelvesForOrigin(state.selectedOrigin).some(s => s.key === key)) return alert('Scaffale già esistente.');
      pushHistory();
      state.manualShelves.push(normalizeManualShelf({ _id: uid(), origine: state.selectedOrigin, key }));
      persist(); closeModal(); render();
    }

    function addShelf() {
      const shelves = getShelvesForOrigin(state.selectedOrigin);
      const first = shelves[0];
      let suggested = 'a';
      if (first && first.parsed.type === 'row_shelf_level') {
        const targetRow = first.row || '1';
        const sameRow = shelves.filter(s => s.row === targetRow).sort((a, b) => a.parsed.sortShelf - b.parsed.sortShelf);
        suggested = `${targetRow}${indexToLetter(sameRow.length)}`;
      } else if (shelves.length) {
        suggested = indexToLetter(shelves.length);
      }
      openModal(`
        <h3>Aggiungi scaffale</h3>
        <div class="modal-grid">
          <div class="full"><input id="newShelfKey" class="input" value="${escapeHtml(suggested)}" /></div>
        </div>
        <div class="row" style="margin-top:14px; justify-content:flex-end;">
          <button class="btn ghost" data-close-modal>Annulla</button>
          <button class="btn primary" id="confirmAddShelfBtn">Crea</button>
        </div>
      `, () => {
        document.getElementById('confirmAddShelfBtn').onclick = () =>
          createShelf(normalizeText(document.getElementById('newShelfKey').value).toLowerCase());
      });
    }

    /* ── Prodotto: aggiunta ── */
    function suggestNextLevel() {
      const records = getCurrentShelfRecords();
      const max = records.reduce((n, r) => Math.max(n, Number(r._parsed.level || 0)), 0);
      return String(max || 1);
    }

    function addProduct() {
      const shelf = getShelvesForOrigin(state.selectedOrigin).find(s => s.key === state.selectedShelfKey);
      if (!shelf) return alert('Scaffale non valido.');
      openModal(`
        <h3>Nuovo prodotto</h3>
        <div class="modal-grid">
          <input id="newCodice" class="input full" placeholder="Codice (PK, obbligatorio)" />
          <input id="newNome" class="input full" placeholder="Nome" />
          <input id="newLunghezza" class="input" placeholder="Lunghezza" />
          <input id="newLarghezza" class="input" placeholder="Larghezza" />
          <input id="newSpessore" class="input" placeholder="Spessore" />
          <input id="newQuantita" class="input" placeholder="Quantità" />
          <input id="newRipiano" class="input full" value="${escapeHtml(suggestNextLevel())}" placeholder="Ripiano" />
        </div>
        <div class="row" style="margin-top:14px; justify-content:flex-end;">
          <button class="btn ghost" data-close-modal>Annulla</button>
          <button class="btn primary" id="confirmAddProductBtn">Crea</button>
        </div>
      `, () => {
        document.getElementById('newCodice').focus();
        document.getElementById('confirmAddProductBtn').onclick = () => {
          const codice = normalizeText(document.getElementById('newCodice').value);
          if (!codice) return alert('Il codice è obbligatorio.');
          if (state.records.some(r => r.codice === codice)) return alert(`Codice "${codice}" già esistente.`);
          const record = normalizeRecord(ensureTimestamp({
            _id: uid(),
            _remoteCodice: null,
            codice,
            nome: normalizeText(document.getElementById('newNome').value),
            lunghezza: normalizeText(document.getElementById('newLunghezza').value),
            larghezza: normalizeText(document.getElementById('newLarghezza').value),
            spessore: normalizeText(document.getElementById('newSpessore').value),
            posizione: buildPosition(shelf.parsed, normalizeText(document.getElementById('newRipiano').value) || '1'),
            quantita_pz: normalizeText(document.getElementById('newQuantita').value),
            origine: state.selectedOrigin,
            created_at: '',
            updated_at: ''
          }, true));
          markPending(record);
          pushHistory();
          state.records.push(record);
          state.manualShelves = state.manualShelves.filter(s => !(s.origine === state.selectedOrigin && s.key === state.selectedShelfKey));
          persist(); closeModal(); render();
        };
      });
    }

    /* ── Modal ── */
    function openModal(content, onReady) {
      el.modalRoot.classList.remove('hidden');
      el.modalRoot.innerHTML = `<div class="modal-backdrop"><div class="modal">${content}</div></div>`;
      el.modalRoot.querySelectorAll('[data-close-modal]').forEach(btn => btn.onclick = closeModal);
      // Chiusura SOLO via pulsanti espliciti (niente tap-sul-backdrop, causava chiusure accidentali su mobile)
      const modalInner = el.modalRoot.querySelector('.modal');
      if (modalInner) {
        modalInner.onclick = (e) => e.stopPropagation();
        modalInner.ontouchstart = (e) => e.stopPropagation();
      }
      if (onReady) onReady();
    }
    function closeModal() {
      el.modalRoot.classList.add('hidden');
      el.modalRoot.innerHTML = '';
    }

    /* ── CSV Export (solo backup) ── */
    function toCsv(records) {
      const headers = ['codice', 'nome', 'lunghezza', 'larghezza', 'spessore', 'posizione', 'quantita_pz', 'origine', 'created_at', 'updated_at'];
      const lines = [headers.join(',')];
      records.forEach(r => lines.push(headers.map(h => csvEscape(r[h] ?? '')).join(',')));
      return lines.join('\n');
    }
    function csvEscape(value) {
      const s = String(value ?? '');
      return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    }
    function downloadFile(filename, content, mime) {
      const blob = new Blob([content], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    }

    /* ── Undo ── */
    function undoLastAction() {
      const last = state.history.pop();
      if (!last) return alert('Nessuna operazione da annullare.');
      state.records = (last.records || []).map(normalizeRecord);
      state.manualShelves = (last.manualShelves || []).map(normalizeManualShelf);
      state.manualOrigins = (last.manualOrigins || []).map(normalizeManualOrigin);
      state.clipboard = last.clipboard || [];
      state.pendingDeletes = last.pendingDeletes || [];
      persist(); render();
    }

    /* ── Config Supabase ── */
    function openConfigModal() {
      const cfg = state.config || { url: '', anonKey: '', table: 'magazzino' };
      openModal(`
        <h3>Configura Supabase</h3>
        <p class="muted small" style="margin-top:6px;">I dati restano salvati solo su questo dispositivo (localStorage).</p>
        <div class="modal-grid">
          <div class="full"><input id="cfgUrl" class="input" placeholder="https://xxx.supabase.co" value="${escapeHtml(cfg.url)}" /></div>
          <div class="full"><input id="cfgKey" class="input" placeholder="anon public key (eyJ...)" value="${escapeHtml(cfg.anonKey)}" /></div>
          <div class="full"><input id="cfgTable" class="input" placeholder="Nome tabella" value="${escapeHtml(cfg.table)}" /></div>
        </div>
        <div class="note warn" style="margin-top:12px;">
          <strong>Attenzione:</strong> la anon key è visibile nel browser. Per proteggere i dati, attiva <em>Row Level Security</em> sulla tabella e definisci le policy con <strong>USING (true)</strong> per le operazioni che ti servono. Esempio in fondo (pulsante "Guida SQL").
        </div>
        <div class="row" style="margin-top:14px; justify-content:space-between;">
          <button class="btn ghost" id="cfgClearBtn">Rimuovi configurazione</button>
          <div class="row">
            <button class="btn ghost" data-close-modal>Annulla</button>
            <button class="btn primary" id="cfgSaveBtn">Salva e testa</button>
          </div>
        </div>
        <div id="cfgTestMsg" class="tiny muted" style="margin-top:10px;"></div>
      `, () => {
        document.getElementById('cfgClearBtn').onclick = () => {
          if (!confirm('Rimuovere configurazione Supabase?')) return;
          state.config = null;
          state.supabase = null;
          persistConfig();
          closeModal(); render();
        };
        document.getElementById('cfgSaveBtn').onclick = async () => {
          const url = normalizeText(document.getElementById('cfgUrl').value);
          const anonKey = normalizeText(document.getElementById('cfgKey').value);
          const table = normalizeText(document.getElementById('cfgTable').value) || 'magazzino';
          if (!url || !anonKey) return alert('URL e anon key sono obbligatori.');
          state.config = { url, anonKey, table };
          persistConfig();
          buildSupabaseClient();
          const msgEl = document.getElementById('cfgTestMsg');
          msgEl.textContent = 'Test connessione…';
          try {
            const { error } = await state.supabase.from(table).select('codice').limit(1);
            if (error) throw error;
            msgEl.textContent = '✅ Connessione OK.';
            setTimeout(() => { closeModal(); render(); }, 600);
          } catch (err) {
            msgEl.textContent = '❌ ' + (err.message || 'Errore sconosciuto');
            msgEl.style.color = 'var(--danger)';
          }
          render();
        };
      });
    }

    function openHelpModal() {
      openModal(`
        <h3>Guida SQL — Tabella &amp; policy</h3>
        <p class="muted small" style="margin-top:6px;">Usa queste query nell'editor SQL di Supabase (una volta, già creato il progetto).</p>
        <div class="note">
          <strong>1) Schema della tabella</strong>
          <pre>create table if not exists magazzino (
  codice text primary key,
  nome text,
  lunghezza text,
  larghezza text,
  spessore text,
  posizione text,
  quantita_pz text,
  origine text,
  created_at timestamptz default now(),
  updated_at timestamptz default now()
);</pre>
        </div>
        <div class="note warn">
          <strong>2) RLS + policy anon (app senza login)</strong>
          <pre>alter table magazzino enable row level security;

create policy "anon_full_access"
  on magazzino for all
  to anon
  using (true)
  with check (true);</pre>
          Così la anon key può leggere e scrivere. Se serve ristretta per IP o per origine, cambia la clausola <em>using</em>.
        </div>
        <div class="row" style="margin-top:14px; justify-content:flex-end;">
          <button class="btn primary" data-close-modal>Ok</button>
        </div>
      `);
    }

    /* ── SYNC ── */
    async function doSync({ silent = false } = {}) {
      if (!state.config) { openConfigModal(); return; }
      if (!state.supabase) buildSupabaseClient();
      if (state.syncing) return;
      if (!state.online) { if (!silent) alert('Offline.'); return; }

      state.syncing = true;
      state.lastSyncError = null;
      renderSyncBar();

      try {
        const table = state.config.table;

        // 1) PUSH: elimina i record cancellati
        if (state.pendingDeletes.length) {
          const { error } = await state.supabase.from(table).delete().in('codice', state.pendingDeletes);
          if (error) throw new Error('Delete: ' + error.message);
          state.pendingDeletes = [];
        }

        // 2) PUSH: upsert dei record modificati/nuovi
        const upserts = state.records.filter(r => r._pendingOp === 'upsert');
        if (upserts.length) {
          const payload = upserts.map(r => ({
            codice: r.codice,
            nome: r.nome || null,
            lunghezza: r.lunghezza || null,
            larghezza: r.larghezza || null,
            spessore: r.spessore || null,
            posizione: r.posizione || null,
            quantita_pz: r.quantita_pz || null,
            origine: r.origine || null,
            created_at: r.created_at || null,
            updated_at: r.updated_at || nowIso()
          }));
          const { error } = await state.supabase.from(table).upsert(payload, { onConflict: 'codice' });
          if (error) throw new Error('Upsert: ' + error.message);
          upserts.forEach(r => { r._pendingOp = null; r._remoteCodice = r.codice; });
        }

        // 3) PULL: scarica tutto (max 5000 per sicurezza)
        const { data, error } = await state.supabase
          .from(table).select('*').order('codice', { ascending: true }).limit(10000);
        if (error) throw new Error('Select: ' + error.message);

        // Conserva _id locali per stessi codici (per non rompere UI)
        const localById = new Map(state.records.map(r => [r.codice, r._id]));
        state.records = (data || []).map(row => normalizeRecord({
          ...row,
          _id: localById.get(row.codice) || uid(),
          _remoteCodice: row.codice,
          _pendingOp: null
        }));

        state.lastSyncAt = nowIso();
        persist();
        render();
      } catch (err) {
        console.error(err);
        state.lastSyncError = err.message || String(err);
        if (!silent) alert('Errore sync: ' + state.lastSyncError);
      } finally {
        state.syncing = false;
        renderSyncBar();
      }
    }

    /* ── Connessione ── */
    function handleOnline()  { state.online = true;  renderSyncBar(); doSync({ silent: true }); }
    function handleOffline() { state.online = false; renderSyncBar(); }

    window.addEventListener('online', handleOnline);
    window.addEventListener('offline', handleOffline);

    /* ── Event listeners ── */
    el.syncBtn.onclick = () => doSync();
    el.configBtn.onclick = openConfigModal;
    el.helpBtn.onclick = openHelpModal;

    el.exportBtn.onclick = () => downloadFile(
      `magazzino_backup_${new Date().toISOString().slice(0,19).replace(/[T:]/g,'-')}.csv`,
      toCsv(state.records),
      'text/csv;charset=utf-8'
    );

    el.resetBtn.onclick = () => {
      if (!confirm('Svuotare la cache LOCALE? I dati sul DB Supabase NON verranno toccati. Le modifiche non ancora sincronizzate andranno perse.')) return;
      pushHistory();
      state.records = [];
      state.manualShelves = [];
      state.manualOrigins = [];
      state.clipboard = [];
      state.pendingDeletes = [];
      state.selectedOrigin = null;
      state.selectedShelfKey = null;
      state.currentScreen = 'home';
      persist(); render();
    };

    el.addOriginBtn.onclick = addOrigin;
    el.backBtn.onclick = () => { state.currentScreen = state.currentScreen === 'shelf' ? 'origin' : 'home'; render(); };
    el.shelfSearchInput.oninput = () => renderOrigin();
    el.productSearchInput.oninput = () => renderShelf();
    el.toggleReorderBtn.onclick = () => { state.reorderMode = !state.reorderMode; renderOrigin(); };
    el.renameShelfBtn.onclick = () => promptRenameShelf();
    el.addShelfBtn.onclick = addShelf;
    el.addProductBtn.onclick = addProduct;
    el.sidePrevShelfBtn.onclick = () => goToAdjacentShelf(-1);
    el.sideNextShelfBtn.onclick = () => goToAdjacentShelf(1);
    el.pasteAllBtn.onclick = pasteAllClipboard;
    el.saveNowBtn.onclick = () => { persist(); alert('Salvato in locale.'); };
    el.clearClipboardBtn.onclick = () => {
      if (!state.clipboard.length) return;
      // I record "tagliati" (cut) che sono in clipboard e vengono buttati → vanno cancellati dal DB
      pushHistory();
      state.clipboard.forEach(item => {
        if (item.mode === 'cut' && item.record.codice) schedulePendingDelete(item.record.codice);
      });
      state.clipboard = [];
      persist();
      renderClipboard();
      renderSyncBar();
    };

    document.addEventListener('keydown', (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'z') {
        event.preventDefault();
        undoLastAction();
        return;
      }
      if (state.currentScreen === 'shelf') {
        if (event.key === 'ArrowLeft') { event.preventDefault(); goToAdjacentShelf(-1); }
        if (event.key === 'ArrowRight') { event.preventDefault(); goToAdjacentShelf(1); }
      }
    });

    /* ── Avvio ── */
    restoreConfig();
    restore();
    if (state.config) buildSupabaseClient();
    render();

    // Primo sync automatico in background se configurato e online
    if (state.config && state.online) {
      doSync({ silent: true });
    } else if (!state.config) {
      // Primo avvio senza config → suggerisco config
      setTimeout(() => openConfigModal(), 300);
    }
  </script>
</body>
</html>
